<h2 class="text-2xl font-bold mt-5">Buscar gifs</h2>
<h3 class="text-sm font-gray-500 mt-5">Buscar gifs por nombre, descripción o tags</h3>
<section class="flex flex-col gap-4">
    <input type="text" placeholder="Buscar gifs"
        class="mt-3 border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-600"
        (keyup.enter)="onSearch(txtSearch.value)" #txtSearch />
</section>
<section class="py-5">
    <div class="h-screen overflow-y-scroll grid grid-cols-2 md:grid-cols-4 gap-4 pt-5" (scroll)="onScroll($event)"
        #groupDiv>
        @for (group of gifService.searchGifGroup(); track $index) {
        <div class="grid gap-4">
            @for (gif of group; track gif.id) {
            <div>
                <img class="h-full w-full rounded-lg object-cover" [src]="gif.url" [alt]="gif.title" />
            </div>
            }
        </div>
        }
    </div>
</section>
